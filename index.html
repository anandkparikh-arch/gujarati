<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ગુજરાતી">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f4f3ee">
<title>ગુજરાતી શીખો</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f4f3ee;color:#1a1a1a;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.app{max-width:480px;margin:0 auto;padding:1rem 1rem env(safe-area-inset-bottom,2rem)}
.screen{display:none}.screen.active{display:block}
/* Canvas */
#confettiCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9998}
/* Celebration */
.celeb-overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9997;pointer-events:none}
.celeb-emoji{font-size:80px;animation:celebPop .5s cubic-bezier(.17,.89,.32,1.49) forwards;opacity:0}
.celeb-text{font-size:26px;font-weight:800;color:white;text-shadow:0 2px 12px rgba(0,0,0,.4);margin-top:12px;animation:celebSlide .5s .15s ease forwards;opacity:0;text-align:center;padding:0 1rem}
@keyframes celebPop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes celebSlide{0%{transform:translateY(20px);opacity:0}100%{transform:translateY(0);opacity:1}}
/* Toast */
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:#1D9E75;color:white;padding:8px 22px;border-radius:99px;font-size:14px;font-weight:700;opacity:0;pointer-events:none;transition:opacity .25s;z-index:9999;box-shadow:0 4px 18px rgba(29,158,117,.4);white-space:nowrap}
.toast.show{opacity:1}
/* Login */
.login-header{text-align:center;padding:1.25rem 0 .75rem}
.login-title{font-size:26px;font-weight:800}
.login-sub{font-size:13px;color:#888;margin-top:3px}
/* Bholu */
.bholu-section{text-align:center;padding:10px 0 4px}
.bholu-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#aaa;margin-bottom:6px}
/* WOTD */
.wotd-card{background:white;border:1.5px solid #e8e8e8;border-radius:16px;padding:14px 16px;margin-bottom:1rem;display:flex;align-items:center;gap:14px}
.wotd-icon{font-size:28px;flex-shrink:0}
.wotd-body{flex:1}
.wotd-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#aaa;margin-bottom:3px}
.wotd-guj{font-size:26px;font-weight:700;line-height:1}
.wotd-roman{font-size:13px;color:#888;font-style:italic}
.wotd-english{font-size:14px;font-weight:600;color:#1a1a1a;margin-top:2px}
.wotd-hear{background:#E1F5EE;border:1.5px solid #5DCAA5;border-radius:10px;padding:8px 14px;font-size:13px;color:#0F6E56;cursor:pointer;font-weight:600;font-family:inherit;white-space:nowrap}
.wotd-hear:disabled{opacity:.5;cursor:wait}
/* Challenge */
.challenge-card{background:linear-gradient(135deg,#667eea,#764ba2);border-radius:16px;padding:14px 16px;margin-bottom:1rem;color:white}
.challenge-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;opacity:.8;margin-bottom:4px}
.challenge-title{font-size:16px;font-weight:700;margin-bottom:6px}
.challenge-progress{display:flex;gap:8px;align-items:center}
.challenge-bar-wrap{flex:1;background:rgba(255,255,255,.25);border-radius:99px;height:8px;overflow:hidden}
.challenge-bar{height:100%;border-radius:99px;background:white;transition:width .6s ease}
.challenge-pct{font-size:12px;font-weight:700;opacity:.9}
.challenge-profiles{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.challenge-pip{font-size:11px;background:rgba(255,255,255,.2);border-radius:99px;padding:3px 8px}
.challenge-pip.done{background:rgba(255,255,255,.5);font-weight:700}
/* Leaderboard */
.lb-section{margin-bottom:1rem}
.section-label{font-size:11px;font-weight:700;color:#bbb;margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em}
.lb-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.lb-card{background:white;border:1px solid #e8e8e8;border-radius:14px;padding:12px}
.lb-title{font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.lb-row{display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:.5px solid #f5f5f5}
.lb-row:last-child{border-bottom:none}
.lb-rank{font-size:14px;width:22px;text-align:center}
.lb-emoji{font-size:20px;width:26px;text-align:center}
.lb-info{flex:1;min-width:0}
.lb-pname{font-size:12px;font-weight:600}
.lb-val{font-size:11px;color:#aaa;margin-top:1px}
.lb-val.hi{color:#1D9E75;font-weight:700}
/* Profiles */
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.profile-card{background:white;border:2px solid #e8e8e8;border-radius:16px;padding:16px 12px 12px;text-align:center;cursor:pointer;transition:all .18s;position:relative}
.profile-card:hover{border-color:#1D9E75;transform:translateY(-2px);box-shadow:0 6px 20px rgba(29,158,117,.15)}
.profile-avatar{font-size:42px;margin-bottom:6px;line-height:1}
.profile-name{font-size:15px;font-weight:700}
.profile-xp{font-size:12px;color:#888;margin-top:2px}
.profile-streak{font-size:12px;margin-top:2px}
.streak-risk{position:absolute;top:8px;right:8px;font-size:10px;background:#FFF5F0;color:#D85A30;border:1px solid #F09595;border-radius:6px;padding:2px 6px;font-weight:700}
.review-badge{position:absolute;top:8px;left:8px;font-size:10px;background:#E6F1FB;color:#0C447C;border:1px solid #85B7EB;border-radius:6px;padding:2px 6px;font-weight:700}
/* PIN */
.pin-wrap{text-align:center;padding:2rem 0}
.pin-avatar-emoji{font-size:64px;margin-bottom:12px;line-height:1}
.pin-name{font-size:20px;font-weight:700;margin-bottom:4px}
.pin-step{font-size:13px;color:#1D9E75;font-weight:600;margin-bottom:4px}
.pin-label{font-size:14px;color:#888;margin-bottom:1.5rem}
.pin-dots{display:flex;gap:14px;justify-content:center;margin-bottom:1.5rem}
.pin-dot{width:18px;height:18px;border-radius:50%;border:2px solid #ccc;background:white;transition:all .15s}
.pin-dot.filled{background:#1D9E75;border-color:#1D9E75}
.pin-dot.wrong{background:#E24B4A;border-color:#E24B4A;animation:shake .35s}
.pin-error{color:#E24B4A;font-size:13px;min-height:18px;margin-bottom:.75rem}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:0 auto 1rem}
.pin-key{padding:16px;background:white;border:1.5px solid #e0e0e0;border-radius:12px;font-size:20px;font-weight:600;cursor:pointer;transition:all .12s;font-family:inherit}
.pin-key:hover{background:#f0fbf7;border-color:#1D9E75}
.pin-key:active{transform:scale(.93)}
.pin-key.del{font-size:16px;color:#888}
.back-link{background:none;border:none;color:#aaa;font-size:14px;cursor:pointer;font-family:inherit;display:block;margin:.5rem auto 0}
/* Home */
.home-header{display:flex;align-items:center;gap:12px;padding:.75rem 0 .5rem}
.home-avatar-emoji{font-size:36px;line-height:1;flex-shrink:0}
.home-greeting{flex:1}
.home-name{font-size:18px;font-weight:700}
.home-tagline{font-size:12px;color:#888;margin-top:1px}
.logout-btn{background:none;border:1px solid #e0e0e0;border-radius:8px;padding:6px 10px;font-size:12px;color:#888;cursor:pointer;font-family:inherit}
.stats-row{display:flex;gap:8px;margin:.25rem 0 .75rem}
.stat-card{flex:1;background:white;border-radius:12px;padding:10px 8px;text-align:center;border:1px solid #e8e8e8}
.stat-num{font-size:20px;font-weight:700}
.stat-label{font-size:10px;color:#888;margin-top:1px}
/* Review */
.review-card{background:#E6F1FB;border:1.5px solid #85B7EB;border-radius:14px;padding:13px 14px;margin-bottom:.75rem;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s}
.review-card:hover{background:#B5D4F4}
.review-icon{font-size:22px}
.review-info{flex:1}
.review-title{font-size:14px;font-weight:700;color:#0C447C}
.review-sub{font-size:12px;color:#185FA5;margin-top:2px}
.review-arrow{font-size:18px;color:#185FA5}
/* Lesson list */
.home-lessons{display:flex;flex-direction:column;gap:8px;margin-bottom:1.25rem}
.lesson-row{display:flex;align-items:center;gap:12px;padding:12px;background:white;border:1.5px solid #e8e8e8;border-radius:14px;cursor:pointer;transition:all .15s}
.lesson-row:hover:not(.locked){border-color:#1D9E75;background:#f0fbf7;box-shadow:0 3px 12px rgba(29,158,117,.1)}
.lesson-row.locked{opacity:.4;cursor:not-allowed}
.l-icon{font-size:22px;width:34px;text-align:center}
.l-info{flex:1}
.l-name{font-size:14px;font-weight:600}
.l-desc{font-size:11px;color:#888;margin-top:1px}
.l-badge{font-size:10px;padding:3px 8px;border-radius:99px;background:#f0f0f0;color:#888;white-space:nowrap;font-weight:600}
.l-badge.done{background:#E1F5EE;color:#085041}
.tip-box{background:#fffbf0;border:1px solid #fde68a;border-radius:10px;padding:11px 13px;font-size:13px;color:#7c6200;line-height:1.6}
/* Lesson */
.back-btn{display:inline-flex;align-items:center;gap:5px;background:none;border:none;color:#888;font-size:13px;cursor:pointer;padding:0 0 .75rem;font-family:inherit}
.progress-bar{background:#e0e0e0;border-radius:99px;height:7px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;background:#1D9E75;transition:width .4s ease}
.prog-label{font-size:11px;color:#aaa;text-align:right;margin-top:3px;margin-bottom:.75rem}
.lesson-card{background:white;border:1.5px solid #e8e8e8;border-radius:16px;padding:1.5rem;margin-bottom:.75rem}
.q-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#ccc;margin-bottom:.75rem}
.word-img{font-size:36px;text-align:center;padding:4px 0}
.guj-big{font-size:52px;text-align:center;padding:.5rem 0 .25rem;line-height:1.2}
.roman{font-size:16px;text-align:center;color:#999;margin-bottom:2px;font-style:italic}
.english{font-size:19px;font-weight:700;text-align:center;margin-bottom:1rem}
.tpr-box{background:#FFF5F0;border:1.5px solid #F09595;border-radius:12px;padding:12px 14px;text-align:center;margin-bottom:10px;font-size:15px;font-weight:600;color:#993C1D}
.listen-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;background:#E1F5EE;border:1.5px solid #5DCAA5;border-radius:12px;font-size:15px;color:#0F6E56;cursor:pointer;font-weight:600;transition:all .15s;font-family:inherit}
.listen-btn:hover:not(:disabled){background:#9FE1CB}
.listen-btn:disabled{opacity:.55;cursor:wait}
.mic-section{margin-top:10px}
.mic-note{font-size:12px;color:#aaa;text-align:center;margin-top:8px;font-style:italic}
.mic-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;background:white;border:1.5px solid #ccc;border-radius:12px;font-size:15px;color:#555;cursor:pointer;transition:all .15s;font-family:inherit;font-weight:500}
.mic-btn:hover:not(:disabled){background:#f5f5f5;border-color:#999}
.mic-btn.recording{background:#FFF5F0;border-color:#D85A30;color:#7a2800;animation:pulse 1.2s infinite}
.mic-btn.success{background:#E1F5EE;border-color:#1D9E75;color:#0F6E56}
.mic-btn.fail{background:#FFF0F0;border-color:#E24B4A;color:#7a0000}
.mic-btn:disabled{opacity:.4;cursor:not-allowed}
.pronun-result{margin-top:10px;padding:12px 14px;border-radius:10px;font-size:14px;display:none;line-height:1.6}
.pronun-result.show{display:block}
.pronun-result.great{background:#E1F5EE;border:1px solid #5DCAA5;color:#085041}
.pronun-result.ok{background:#EAF3DE;border:1px solid #97C459;color:#173404}
.pronun-result.retry{background:#FAEEDA;border:1px solid #EF9F27;color:#633806}
.pronun-result.nothing{background:#FFF0F0;border:1px solid #F09595;color:#501313}
.pronun-heard{font-size:12px;opacity:.7;margin-top:4px}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:.75rem}
.choice-btn{padding:14px 8px;background:#f8f8f8;border:1.5px solid #e0e0e0;border-radius:12px;font-size:14px;cursor:pointer;text-align:center;transition:all .15s;color:#1a1a1a;font-family:inherit;font-weight:500}
.choice-btn:hover:not(:disabled){border-color:#1D9E75;background:#f0fbf7}
.choice-btn.correct{background:#E1F5EE;border-color:#1D9E75;color:#085041;font-weight:700}
.choice-btn.wrong{background:#FFF0F0;border-color:#E24B4A;color:#7a1a1a}
.choice-btn:disabled{cursor:default}
.pick-feedback{margin-top:10px;padding:10px 13px;border-radius:10px;font-size:14px;display:none;font-weight:500}
.pick-feedback.show{display:block}
.pick-feedback.good{background:#E1F5EE;color:#085041}
.pick-feedback.bad{background:#FAEEDA;color:#633806}
.next-btn{width:100%;padding:14px;background:#1D9E75;color:white;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;margin-top:.75rem;display:none;transition:background .15s;font-family:inherit}
.next-btn:hover{background:#0F6E56}
.next-btn.show{display:block}
/* Complete */
.complete-wrap{text-align:center;padding:2rem 1rem 1rem}
.complete-icon{font-size:64px;margin-bottom:.5rem;animation:celebPop .5s cubic-bezier(.17,.89,.32,1.49) forwards}
.complete-title{font-size:24px;font-weight:800;margin-bottom:5px}
.complete-sub{font-size:14px;color:#666;margin-bottom:1.5rem;line-height:1.6}
.complete-stats{display:flex;justify-content:center;gap:2.5rem;margin-bottom:1.5rem}
.cs-num{font-size:32px;font-weight:800;color:#1D9E75}
.cs-label{font-size:12px;color:#888;margin-top:2px}
.sr-next{background:#f8f8f8;border:1px solid #e0e0e0;border-radius:12px;padding:12px 14px;margin-bottom:1rem;font-size:13px;color:#666;text-align:center}
.sr-next strong{color:#1a1a1a}
/* Animations */
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.65}}
</style>
</head>
<body>
<canvas id="confettiCanvas"></canvas>
<div class="toast" id="toast"></div>
<div class="app">

<!-- LOGIN -->
<div class="screen active" id="loginScreen">
  <div class="login-header">
    <div class="login-title">ગુજરાતી શીખો</div>
    <div class="login-sub">Learn Gujarati · 5 minutes a day</div>
  </div>
  <div id="bholuSection"></div>
  <div id="wotdSection"></div>
  <div id="challengeSection"></div>
  <div class="lb-section">
    <div class="section-label">Family leaderboard</div>
    <div class="lb-grid" id="loginLbGrid"></div>
  </div>
  <div class="section-label">Who's learning today?</div>
  <div class="profile-grid" id="profileGrid"></div>
</div>

<!-- PIN -->
<div class="screen" id="pinScreen">
  <div id="pinWrap" class="pin-wrap"></div>
</div>

<!-- HOME -->
<div class="screen" id="homeScreen">
  <div class="home-header">
    <div class="home-avatar-emoji" id="homeAvatar"></div>
    <div class="home-greeting">
      <div class="home-name" id="homeName"></div>
      <div class="home-tagline">ગુજરાતી શીખો · 5 min a day</div>
    </div>
    <button class="logout-btn" id="logoutBtn">← Switch</button>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" id="statStreak">0</div><div class="stat-label">🔥 Streak</div></div>
    <div class="stat-card"><div class="stat-num" id="statXP">0</div><div class="stat-label">⭐ XP</div></div>
    <div class="stat-card"><div class="stat-num" id="statWords">0</div><div class="stat-label">💬 Words</div></div>
  </div>
  <div style="text-align:center;margin:-.5rem 0 .75rem">
    <span id="levelBadge" style="font-size:13px;font-weight:700;background:#f0f0f0;padding:4px 14px;border-radius:99px;color:#555">🌱 Beginner</span>
  </div>
  <div id="homeBholuWrap" style="text-align:center;margin-bottom:.5rem"></div>
  <div id="reviewSection"></div>
  <div class="section-label">Lessons</div>
  <div class="home-lessons" id="lessonList"></div>
  <div class="tip-box">💡 Listen carefully then say it out loud. Your review queue brings back words at the perfect time!</div>
</div>

<!-- LESSON -->
<div class="screen" id="lessonScreen">
  <button class="back-btn" id="backBtn">← Home</button>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="prog-label" id="progLabel">0 / 0</div>
  <div class="lesson-card" id="qCard"></div>
  <button class="next-btn" id="nextBtn">Continue →</button>
</div>

<!-- COMPLETE -->
<div class="screen" id="completeScreen">
  <div class="complete-wrap">
    <div class="complete-icon" id="cIcon">🎉</div>
    <div class="complete-title" id="cTitle"></div>
    <div class="complete-sub" id="cSub"></div>
    <div class="complete-stats">
      <div><div class="cs-num" id="cXP">0</div><div class="cs-label">XP earned</div></div>
      <div><div class="cs-num" id="cCorrect">0</div><div class="cs-label">Correct</div></div>
    </div>
    <div class="sr-next" id="srNext"></div>
    <button class="next-btn show" id="doneBtn" style="max-width:220px;margin:0 auto">Back to home</button>
  </div>
</div>

</div><!-- .app -->

<script>
/* ═══════════════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════════════ */
const CFG = {
  API_BASE:    'https://gujaratiapi-jg5pnhp7aa-uc.a.run.app',
  APP_KEY:     'guj-parikh-2026',
  TTS_KEY:     'AIzaSyCRkcUmaD_ViELXitTFCtQlOf2HKPtaGK4',
  STORAGE_KEY: 'guj_cache_v1',
  PIN_KEY:     'guj_pins',
  OLD_KEYS:    ['guj_v5', 'guj_v4'],
};

/* ═══════════════════════════════════════════════════════
   PROFILES
═══════════════════════════════════════════════════════ */
const PROFILES = [
  { id:'anand',  name:'Anand',  emoji:'🧔🏾', color:'#1D9E75' },
  { id:'lauren', name:'Lauren', emoji:'👩',   color:'#7F77DD' },
  { id:'mira',   name:'Mira',   emoji:'👧🏽', color:'#D4537E' },
  { id:'hugo',   name:'Hugo',   emoji:'👦🏽', color:'#378ADD' },
];

/* ═══════════════════════════════════════════════════════
   LEVELS  (XP thresholds)
═══════════════════════════════════════════════════════ */
const LEVELS = [
  { name:'Beginner',  icon:'🌱', min:0    },
  { name:'Explorer',  icon:'🔍', min:150  },
  { name:'Speaker',   icon:'💬', min:400  },
  { name:'Learner',   icon:'📚', min:800  },
  { name:'Fluent',    icon:'🌟', min:1400 },
  { name:'Master',    icon:'👑', min:2200 },
];
function getLevel(xp) {
  let lv = LEVELS[0];
  for (const l of LEVELS) { if (xp >= l.min) lv = l; else break; }
  return lv;
}
function getNextLevel(xp) {
  for (const l of LEVELS) { if (xp < l.min) return l; }
  return null;
}

/* ═══════════════════════════════════════════════════════
   STAGES  (curriculum stages)
═══════════════════════════════════════════════════════ */
const STAGES = [
  { num:1, name:'Core Survival',    color:'#1D9E75' },
  { num:2, name:'First Phrases',    color:'#378ADD' },
  { num:3, name:'Simple Sentences', color:'#7F77DD' },
  { num:4, name:'Conversations',    color:'#D4537E' },
  { num:5, name:'Fluency Building', color:'#f4a261' },
  { num:6, name:'Culture',          color:'#854F0B' },
];

/* ═══════════════════════════════════════════════════════
   BHOLU  — monster guide
   Unlocks clothing as each stage completes
═══════════════════════════════════════════════════════ */
const BHOLU_ITEMS = [
  { stage:1, emoji:'🎩', label:'tiny hat'        },
  { stage:2, emoji:'🎀', label:'giant bow tie'   },
  { stage:3, emoji:'🕶️', label:'cool sunglasses' },
  { stage:4, emoji:'🧦', label:'mismatched socks'},
  { stage:5, emoji:'🤵', label:'tuxedo jacket'   },
  { stage:6, emoji:'🎓', label:'graduation cap'  },
];

function getBholuItems(completed) {
  const done = new Set();
  STAGES.forEach(s => {
    const sl = LESSONS.filter(l => l.stage === s.num);
    if (sl.length && sl.every(l => completed.includes(l.id))) done.add(s.num);
  });
  return BHOLU_ITEMS.filter(b => done.has(b.stage));
}

function renderBholu(completed, size) {
  const s = size || 72;
  const items = getBholuItems(completed);
  const cap  = items.find(i => i.stage === 6) ? '🎓' : items.find(i => i.stage === 1) ? '🎩' : '';
  const face = items.find(i => i.stage === 3) ? '🥸' : '😊';
  const bow  = items.find(i => i.stage === 2) ? `<div style="font-size:${Math.round(s*.28)}px;margin-top:-${Math.round(s*.06)}px">🎀</div>` : '';
  const socks= items.find(i => i.stage === 4) ? `<div style="font-size:${Math.round(s*.22)}px">🧦🧦</div>` : '';
  return `<div style="display:inline-block;position:relative;width:${s}px;text-align:center;line-height:1.1">
    ${cap ? `<div style="font-size:${Math.round(s*.3)}px">${cap}</div>` : `<div style="font-size:${Math.round(s*.3)}px;opacity:0">·</div>`}
    <div style="font-size:${Math.round(s*.55)}px">${face}</div>
    ${bow}${socks}
  </div>`;
}

const ALL_WORDS = LESSONS.flatMap(l => l.words.map(w => ({...w, lessonId: l.id})));
/* ═══════════════════════════════════════════════════════
   API  — all server communication in one place
   • 8-second timeout on every call
   • returns null on failure (never throws)
═══════════════════════════════════════════════════════ */
const API = {
  async get(path) {
    if (!CFG.API_BASE) return null;
    try {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 8000);
      const r = await fetch(CFG.API_BASE + path, {
        headers: { 'X-Api-Key': CFG.APP_KEY },
        signal: ctrl.signal
      });
      clearTimeout(t);
      return r.json();
    } catch(e) { console.warn('API GET', path, e.message); return null; }
  },

  async post(path, body) {
    if (!CFG.API_BASE) return null;
    try {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 8000);
      const r = await fetch(CFG.API_BASE + path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Api-Key': CFG.APP_KEY },
        body: JSON.stringify(body),
        signal: ctrl.signal
      });
      clearTimeout(t);
      return r.json();
    } catch(e) { console.warn('API POST', path, e.message); return null; }
  },

  // Push scores for one profile — never blocks UI, retries once on fail
  pushScores(profileId, data) {
    const { pin: _pin, ...payload } = data;
    const hasData = (payload.xp > 0) || (payload.completed && payload.completed.length > 0)
                 || (payload.streak > 0) || (payload.activityLog && payload.activityLog.length > 0);
    if (!hasData) return;
    // Retry up to 3 times with exponential backoff
    const attempt = (n) => {
      this.post('/v1/scores/' + profileId, payload)
        .then(r => {
          if ((!r || r.error) && n < 3) setTimeout(() => attempt(n + 1), 2000 * n);
        })
        .catch(() => { if (n < 3) setTimeout(() => attempt(n + 1), 2000 * n); });
    };
    attempt(1);
  },

  // Pull scores for one profile from server
  async pullScores(profileId) {
    const res = await this.get('/v1/scores/' + profileId);
    return res && res.scores ? res.scores : null;
  },

  // Log a user event (fire and forget)
  logEvent(profileId, type, payload = {}) {
    this.post('/v1/events', { profileId, type, payload, appVersion: '3.0' }).catch(() => {});
  },

  // Record event through scoring microservice (primary write path)
  async recordEvent(profileId, type, data) {
    return this.post('/v1/events/record', { profileId, type, data, clientTs: Date.now() });
  },

  // AI lesson generation
  async generateLesson(profileId) {
    return this.post('/v1/lessons/generate/' + profileId, {});
  },
  async fetchGeneratedLessons(profileId) {
    const res = await this.get('/v1/lessons/generated/' + profileId);
    return res && res.lessons ? res.lessons : [];
  },
  async markLessonComplete(profileId, firestoreId, score) {
    return this.post('/v1/lessons/complete/' + profileId, { firestoreId, score });
  },
};

/* ═══════════════════════════════════════════════════════
   STORE  — all app state in one place
   • localStorage for offline
   • PINs never leave the device
═══════════════════════════════════════════════════════ */
/* ═══════════════════════════════════════════════════════
   STORE  — Event-sourced state management
   
   Architecture:
   • Every score change is an IMMUTABLE EVENT appended to a local log
   • State (completed, xp, streak) is DERIVED from events
   • Events are append-only: you cannot lose progress by overwriting state
   • Events sync to API asynchronously with a persistent retry queue
   • Two devices merge by taking the UNION of their event lists
   • State can never go backwards because events cannot be removed
   
   Event types:
     lesson_complete   { lessonId, xp, correct, total }
     review_complete   { wordCount, xp }
     xp_earned        { amount, source }
     streak_day       { date }
     ai_lesson_done   { lessonId, firestoreId }
═══════════════════════════════════════════════════════ */
/* ═══════════════════════════════════════════════════════
   STORE  — Thin client layer over the scoring microservice

   Architecture:
   • Scoring logic lives ENTIRELY on the server (Cloud Function)
   • Client records raw events via POST /v1/events/record
   • Server applies scoring engine, returns authoritative state
   • Client caches last known state in localStorage (offline support)
   • Offline: queue events, show cached state, sync on reconnect
   • Local state can NEVER get out of sync permanently — server wins
═══════════════════════════════════════════════════════ */
const Store = {
  data:      {},   // cached derived state per profileId
  aiLessons: [],

  // ── INIT ─────────────────────────────────────────────
  load() {
    // Load cached state from localStorage
    try { this.data = JSON.parse(localStorage.getItem('guj_cache_v1') || '{}'); } catch(e) { this.data = {}; }

    // Restore PINs
    const pins = this._loadPins();
    PROFILES.forEach(p => {
      if (!this.data[p.id]) this.data[p.id] = {};
      this.data[p.id].pin = pins[p.id] || null;
    });

    // Migrate any legacy event log or state data
    this._migrate();

    // Process any queued offline events
    this._processQueue();
  },

  // ── RECORD EVENT ─────────────────────────────────────
  // The single interface for all state changes.
  // Sends event to server, gets authoritative state back.
  // If offline: queues locally, applies optimistic update.
  async addEvent(profileId, type, data) {
    const clientTs = Date.now();

    // Always cache immediately — offline safety net
    this._optimisticUpdate(profileId, type, data);

    // Call server
    const result = await API.post('/v1/events/record', { profileId, type, data, clientTs });

    if (result && result.scores && !result.error) {
      // Server returned authoritative state — use it
      const pin = this.data[profileId]?.pin;
      this.data[profileId] = { ...result.scores, pin };
      this._persist();
      return result;
    } else {
      // Server unavailable — queue for retry
      this._queueEvent(profileId, type, data, clientTs);
      return null;
    }
  },

  // ── OPTIMISTIC UPDATE ────────────────────────────────
  // Applied immediately before server confirms.
  // Keeps UI responsive. Server state overrides this on sync.
  _optimisticUpdate(profileId, type, data) {
    const d = this.profile(profileId);
    const pin = d.pin;

    switch(type) {
      case 'lesson_complete':
        d.xp = (d.xp || 0) + (data.xp || 0);
        if (data.lessonId && !(d.completed||[]).includes(data.lessonId)) {
          if (!d.completed) d.completed = [];
          d.completed.push(data.lessonId);
        }
        // Update level display (mirrors server constants)
        d.level = getLevel(d.xp);
        d.nextLevel = getNextLevel(d.xp);
        d.bholuItems = getBholuItems(d.completed || []);
        break;
      case 'review_complete':
        d.xp = (d.xp || 0) + (data.xp || 0);
        d.level = getLevel(d.xp);
        break;
      case 'streak_day':
        if (data.date) {
          if (!d.activityLog) d.activityLog = [];
          if (!d.activityLog.includes(data.date)) d.activityLog.push(data.date);
        }
        break;
    }

    d.pin = pin;
    this._persist();
  },

  // ── PROFILE ACCESS ───────────────────────────────────
  profile(id) {
    if (!this.data[id]) {
      this.data[id] = {
        xp: 0, streak: 0, lastDate: '', completed: [],
        activityLog: [], sr: {}, lessonScores: {},
        level: { name:'Beginner', icon:'🌱', min:0 },
        bholuItems: [], needsReinforcement: [],
      };
      const pins = this._loadPins();
      this.data[id].pin = pins[id] || null;
    }
    return this.data[id];
  },

  // ── PIN MANAGEMENT ───────────────────────────────────
  savePin(profileId, pin) {
    if (this.data[profileId]) this.data[profileId].pin = pin;
    this._savePins();
  },
  _savePins() {
    const pins = {};
    PROFILES.forEach(p => { pins[p.id] = (this.data[p.id]?.pin) || null; });
    try { localStorage.setItem(CFG.PIN_KEY, JSON.stringify(pins)); } catch(e) {}
  },
  _loadPins() {
    try { return JSON.parse(localStorage.getItem(CFG.PIN_KEY) || '{}'); } catch(e) { return {}; }
  },

  // ── PERSIST ──────────────────────────────────────────
  _persist() {
    const store = {};
    PROFILES.forEach(p => {
      if (!this.data[p.id]) return;
      const { pin, ...rest } = this.data[p.id];
      store[p.id] = rest;
    });
    try { localStorage.setItem('guj_cache_v1', JSON.stringify(store)); } catch(e) {}
  },

  // ── SERVER SYNC ──────────────────────────────────────
  // Called after PIN entry — pulls authoritative state from server
  async syncFromServer(profileId) {
    try {
      // Flush any queued events first
      await this._flushQueue(profileId);

      // Pull authoritative state
      const res = await API.get('/v1/scores/' + profileId);
      if (res && res.scores) {
        const pin = this.data[profileId]?.pin;
        this.data[profileId] = { ...res.scores, pin };
        this._persist();
      }
    } catch(e) { console.warn('syncFromServer:', e.message); }

    // Fetch AI lessons
    try {
      this.aiLessons = await API.fetchGeneratedLessons(profileId);
      this._injectAILessons();
    } catch(e) {}
  },

  // ── OFFLINE EVENT QUEUE ──────────────────────────────
  _queueEvent(profileId, type, data, ts) {
    const queue = this._loadQueue();
    queue.push({ profileId, type, data, ts, attempts: 0 });
    this._saveQueue(queue);
  },

  _processQueue() {
    const queue = this._loadQueue();
    if (!queue.length) return;
    // Deduplicate by profileId and flush
    const profiles = [...new Set(queue.map(q => q.profileId))];
    profiles.forEach(pid => this._flushQueue(pid).catch(() => {}));
  },

  async _flushQueue(profileId) {
    const queue = this._loadQueue();
    const pending = queue.filter(q => q.profileId === profileId);
    if (!pending.length) return;

    let allOk = true;
    for (const item of pending) {
      const result = await API.post('/v1/events/record', {
        profileId: item.profileId, type: item.type, data: item.data, clientTs: item.ts,
      });
      if (!result || result.error) { allOk = false; break; }
      // Update cache with server response
      if (result.scores) {
        const pin = this.data[profileId]?.pin;
        this.data[profileId] = { ...result.scores, pin };
      }
    }

    if (allOk) {
      const remaining = queue.filter(q => q.profileId !== profileId);
      this._saveQueue(remaining);
      this._persist();
    }
  },

  _loadQueue() {
    try { return JSON.parse(localStorage.getItem('guj_queue_v1') || '[]'); } catch(e) { return []; }
  },
  _saveQueue(q) {
    try { localStorage.setItem('guj_queue_v1', JSON.stringify(q)); } catch(e) {}
  },

  // ── AI LESSONS ───────────────────────────────────────
  _injectAILessons() {
    this.aiLessons.forEach(l => {
      if (!LESSONS.find(x => x.id === l.id)) {
        LESSONS.push({ ...l, _ai: true });
        if (l.words) l.words.forEach(w => {
          if (!ALL_WORDS.find(x => x.g === w.g)) ALL_WORDS.push({ ...w, lessonId: l.id });
        });
      }
    });
  },

  maybeGenerateLesson(profileId) {
    const d = this.profile(profileId);
    const completed = d.completed || [];
    const totalCurated = LESSONS.filter(l => !l._ai).length;
    const completedCurated = completed.filter(id => LESSONS.find(l => l.id===id && !l._ai)).length;
    const pendingAI = this.aiLessons.filter(l => !completed.includes(l.id)).length;
    if (completedCurated > totalCurated * 0.5 && pendingAI < 2) {
      API.generateLesson(profileId)
        .then(res => { if (res?.lesson) { this.aiLessons.push(res.lesson); this._injectAILessons(); }})
        .catch(() => {});
    }
  },

  // ── MIGRATION ────────────────────────────────────────
  // Convert any legacy data (event log, old state) to the server
  // by submitting restore events. Runs once on first load with new code.
  _migrate() {
    const migrated = localStorage.getItem('guj_migrated_v3');
    if (migrated) return;

    // Try to find the richest available data from old storage keys
    const oldKeys = ['guj_events_v1', 'guj_cache_v1', 'guj_v6', 'guj_v5', 'guj_v4'];
    const merged = {}; // profileId -> { xp, completed, activityLog }

    // First try event log (most accurate)
    try {
      const events = JSON.parse(localStorage.getItem('guj_events_v1') || '{}');
      PROFILES.forEach(p => {
        if (!events[p.id]) return;
        merged[p.id] = { xp: 0, completed: [], activityLog: [] };
        events[p.id].forEach(evt => {
          if (evt.type === 'lesson_complete' && evt.data?.lessonId && evt.data.lessonId !== '__restore__') {
            merged[p.id].xp += (evt.data.xp || 0);
            if (!merged[p.id].completed.includes(evt.data.lessonId)) merged[p.id].completed.push(evt.data.lessonId);
          }
          if (evt.type === 'streak_day' && evt.data?.date && !merged[p.id].activityLog.includes(evt.data.date)) {
            merged[p.id].activityLog.push(evt.data.date);
          }
          if (evt.type === 'xp_earned') merged[p.id].xp += (evt.data?.amount || 0);
        });
      });
    } catch(e) {}

    // Then layer in any state-based storage (for profiles not in event log)
    ['guj_v6','guj_v5','guj_v4'].forEach(key => {
      try {
        const old = JSON.parse(localStorage.getItem(key) || '{}');
        PROFILES.forEach(p => {
          const d = old[p.id];
          if (!d) return;
          if (!merged[p.id]) merged[p.id] = { xp: 0, completed: [], activityLog: [] };
          if ((d.xp || 0) > (merged[p.id].xp || 0)) merged[p.id].xp = d.xp;
          (d.completed || []).forEach(id => { if (!merged[p.id].completed.includes(id)) merged[p.id].completed.push(id); });
          (d.activityLog || []).forEach(dt => { if (!merged[p.id].activityLog.includes(dt)) merged[p.id].activityLog.push(dt); });
        });
      } catch(e) {}
    });

    // Push restore events to server for any profile with legacy data
    // Uses a short delay to avoid hammering API on first load
    let delay = 500;
    PROFILES.forEach(p => {
      const m = merged[p.id];
      if (!m || (!m.xp && !m.completed.length)) return;
      setTimeout(() => {
        API.post('/v1/events/record', {
          profileId: p.id,
          type: 'lesson_complete',
          data: {
            lessonId: '__restore__',
            xp: m.xp,
            _restoredLessons: m.completed,
            _migrated: true,
            activityLog: m.activityLog,
          },
          clientTs: Date.now(),
        }).then(res => {
          if (res?.scores) {
            const pin = this.data[p.id]?.pin;
            this.data[p.id] = { ...res.scores, pin };
            this._persist();
          }
        }).catch(() => {});
      }, delay);
      delay += 300;
    });

    localStorage.setItem('guj_migrated_v3', '1');
  },
};


const SR_INTERVALS = [1, 3, 7, 14, 30, 60];

const SR = {
  record(profileId, wordG, correct) {
    const sr = Store.profile(profileId).sr;
    if (!sr[wordG]) sr[wordG] = { level: 0, nextReview: null };
    const e = sr[wordG];
    e.level = correct ? Math.min(e.level + 1, SR_INTERVALS.length - 1) : Math.max(0, e.level - 1);
    const next = new Date();
    next.setDate(next.getDate() + SR_INTERVALS[e.level]);
    e.nextReview = next.toISOString().slice(0, 10);
    e.lastSeen = todayISO();
  },

  // Words due for review today
  getDue(profileId) {
    const d = Store.profile(profileId);
    const sr = d.sr;
    const today = todayISO();
    const seen = [], unseen = [];
    ALL_WORDS.forEach(w => {
      const e = sr[w.g];
      if (e && e.nextReview) {
        if (e.nextReview <= today) seen.push(w);
      } else {
        if ((d.completed||[]).includes(w.lessonId)) unseen.push(w);
      }
    });
    return [...seen, ...unseen.slice(0, Math.max(0, 10 - seen.length))];
  },

  getDueCount(profileId) { return this.getDue(profileId).length; },

  // Get weak words for a specific lesson (for reinforcement)
  getWeakWords(profileId, lessonId) {
    const lesson = LESSONS.find(l => l.id === lessonId);
    if (!lesson) return [];
    const sr = Store.profile(profileId).sr;
    return lesson.words.filter(w => !sr[w.g] || sr[w.g].level <= 1);
  },

  // Record lesson mastery score
  recordMastery(profileId, lessonId, correct, total) {
    const d = Store.profile(profileId);
    if (!d.lessonScores) d.lessonScores = {};
    const pct = total > 0 ? correct / total : 0;
    const existing = d.lessonScores[lessonId];
    if (!existing || pct > existing.pct) {
      d.lessonScores[lessonId] = { pct, correct, total, date: todayISO() };
    }
  },

  getMastery(profileId, lessonId) {
    const d = Store.profile(profileId);
    return d.lessonScores && d.lessonScores[lessonId] ? d.lessonScores[lessonId] : null;
  },

  needsReinforcement(profileId, lessonId) {
    const lesson = LESSONS.find(l => l.id === lessonId);
    const threshold = lesson && lesson.masteryThreshold ? lesson.masteryThreshold : 0.7;
    const mastery = this.getMastery(profileId, lessonId);
    return mastery ? mastery.pct < threshold : false;
  },
};

/* ═══════════════════════════════════════════════════════
   AUDIO MANAGER
   Single source of truth for all audio.
   Key design:
   • fetchId cancels stale fetches without blocking UI
   • Button re-enabled as soon as audio STARTS playing
   • All handlers via .onclick (never addEventListener)
   • stop() cancels everything and increments fetchId
═══════════════════════════════════════════════════════ */
const AudioMgr = {
  cache: {},
  fetchId: 0,
  current: null,

  async speak(ttsText, btnEl) {
    // Cancel any in-flight fetch
    this.fetchId++;
    const myId = this.fetchId;

    // Stop currently playing audio
    if (this.current) {
      try { this.current.pause(); this.current.currentTime = 0; } catch(e) {}
      this.current = null;
    }

    if (btnEl) btnEl.disabled = true;

    try {
      // Use cache if available
      let b64 = this.cache[ttsText];
      if (!b64) {
        const resp = await fetch(
          `https://texttospeech.googleapis.com/v1/text:synthesize?key=${CFG.TTS_KEY}`,
          { method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              input: { text: ttsText },
              voice: { languageCode: 'gu-IN', name: 'gu-IN-Standard-A', ssmlGender: 'FEMALE' },
              audioConfig: { audioEncoding: 'MP3', speakingRate: 0.82 }
            })
          }
        );
        // Bail if a newer call started while we were fetching
        if (myId !== this.fetchId) return;
        const data = await resp.json();
        if (!data.audioContent) throw new Error('No audio returned');
        b64 = data.audioContent;
        this.cache[ttsText] = b64;
      }

      // Bail if newer call or button removed from DOM
      if (myId !== this.fetchId) return;
      if (btnEl && !document.contains(btnEl)) return;

      const audio = new Audio('data:audio/mp3;base64,' + b64);
      this.current = audio;

      // Re-enable button immediately when audio STARTS — not when it ends
      // This is what fixes the "button stuck disabled" bug across multiple cards
      if (btnEl && document.contains(btnEl)) btnEl.disabled = false;

      audio.onended = () => { if (this.current === audio) this.current = null; };
      audio.onerror = () => { if (this.current === audio) this.current = null; };

      const p = audio.play();
      if (p) p.catch(() => {}); // handle autoplay block silently

    } catch(err) {
      if (btnEl && document.contains(btnEl)) btnEl.disabled = false;
      console.warn('TTS error:', err.message);
    }
  },

  stop() {
    if (this.current) {
      try { this.current.pause(); this.current.currentTime = 0; } catch(e) {}
      this.current = null;
    }
    this.fetchId++; // cancel any in-flight fetch
  },
};

/* ═══════════════════════════════════════════════════════
   PRONUNCIATION SCORING
═══════════════════════════════════════════════════════ */
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length:m+1}, (_,i) => Array.from({length:n+1}, (_,j) => i===0?j:j===0?i:0));
  for (let i=1;i<=m;i++) for (let j=1;j<=n;j++)
    dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}
function translit(text) {
  const map={'ક':'k','ખ':'kh','ગ':'g','ઘ':'gh','ચ':'ch','છ':'chh','જ':'j','ઝ':'jh','ત':'t','થ':'th','દ':'d','ધ':'dh','ન':'n','પ':'p','ફ':'f','બ':'b','ભ':'bh','મ':'m','ય':'y','ર':'r','લ':'l','ળ':'l','વ':'v','શ':'sh','ષ':'sh','સ':'s','હ':'h','ા':'aa','િ':'i','ી':'ee','ુ':'u','ૂ':'oo','ે':'e','ૈ':'ai','ો':'o','ૌ':'au','ં':'n','અ':'a','આ':'aa','ઇ':'i','ઈ':'ee','ઉ':'u','ઊ':'oo','એ':'e','ઓ':'o'};
  return text.split('').map(c => map[c]||c).join('').replace(/[^\w\s]/g,'').toLowerCase().trim();
}
function scorePronu(heard, expectedRoman) {
  if (!heard || !heard.trim()) return 'nothing';
  const h = heard.toLowerCase().replace(/[^a-z\u0A80-\u0AFF\s]/g,'').trim();
  const hR = /[\u0A80-\u0AFF]/.test(h) ? translit(h) : h.replace(/[^a-z\s]/g,'');
  const e = expectedRoman.toLowerCase().trim();
  if (hR === e) return 'great';
  const hW = hR.split(/\s+/), eW = e.split(/\s+/);
  let hits = 0;
  eW.forEach(ew => { if (hW.some(hw => hw===ew || levenshtein(hw,ew)<=Math.ceil(ew.length*.35))) hits++; });
  const ratio = hits / eW.length;
  if (ratio >= 0.75) return 'great';
  if (ratio >= 0.4) return 'ok';
  if (hR.length > 0) return 'retry';
  return 'nothing';
}
const PRONUN_FB = {
  great: ['🌟 Excellent! Perfect pronunciation!','🌟 Spot on! That sounded great!','🌟 Perfect — you nailed it!'],
  ok:    ['👍 Good try! Listen and match it more closely.','👍 Getting there — one more try!'],
  retry: ['🔄 Not quite — listen carefully and try again.','🔄 Keep at it — you can do this!'],
  nothing:['🎤 Nothing heard — check your mic and speak clearly!','🎤 Speak up — we\'re listening!'],
};
function randFB(level) { const a = PRONUN_FB[level]; return a[Math.floor(Math.random()*a.length)]; }

/* ═══════════════════════════════════════════════════════
   CONFETTI ENGINE
═══════════════════════════════════════════════════════ */
const Confetti = {
  canvas: null, ctx: null,
  particles: [], animFrame: null,

  init() {
    this.canvas = document.getElementById('confettiCanvas');
    this.ctx = this.canvas.getContext('2d');
    const resize = () => { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; };
    window.addEventListener('resize', resize);
    resize();
  },

  launch(intensity) {
    const mobile = /Mobi|Android|iP(hone|od|ad)/i.test(navigator.userAgent);
    const count = intensity==='mega'?(mobile?120:300):intensity==='big'?(mobile?60:150):(mobile?25:60);
    const colors = ['#1D9E75','#D4537E','#378ADD','#f4a261','#7F77DD','#ffd700','#ff6b6b','#4ecdc4'];
    const shapes = ['circle','square','triangle','star'];
    for (let i=0; i<count; i++) {
      this.particles.push({
        x: Math.random()*this.canvas.width,
        y: -20 - Math.random()*this.canvas.height*.3,
        vx:(Math.random()-.5)*6, vy:2+Math.random()*5,
        rot:Math.random()*360, rotV:(Math.random()-.5)*8,
        size:6+Math.random()*10,
        color:colors[Math.floor(Math.random()*colors.length)],
        shape:shapes[Math.floor(Math.random()*shapes.length)],
        opacity:1, life:1
      });
    }
    if (intensity==='big'||intensity==='mega') {
      for (let i=0;i<(intensity==='mega'?8:4);i++) {
        this.particles.push({
          x:Math.random()*this.canvas.width, y:this.canvas.height+10,
          vx:(Math.random()-.5)*3, vy:-(8+Math.random()*8),
          rot:0, rotV:0, size:14,
          color:colors[Math.floor(Math.random()*colors.length)],
          shape:'rocket', opacity:1, life:1, trail:[]
        });
      }
    }
    if (!this.animFrame) this._animate();
  },

  _animate() {
    const {ctx, canvas} = this;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    this.particles = this.particles.filter(p => p.opacity > 0.01 && p.y < canvas.height+50);
    this.particles.forEach(p => {
      ctx.save(); ctx.globalAlpha = p.opacity;
      if (p.shape==='rocket') {
        p.trail.push({x:p.x,y:p.y});
        if (p.trail.length>12) p.trail.shift();
        p.trail.forEach((t,i) => {
          ctx.beginPath(); ctx.arc(t.x,t.y,3*(i/p.trail.length),0,Math.PI*2);
          ctx.fillStyle=p.color; ctx.globalAlpha=p.opacity*(i/p.trail.length)*.5; ctx.fill();
        });
        ctx.globalAlpha=p.opacity;
        ctx.font=`${p.size}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('🚀',p.x,p.y);
        p.vy+=.3;
        if (p.vy>0) { this._burst(p.x,p.y,p.color); p.opacity=0; }
      } else {
        ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180); ctx.fillStyle=p.color;
        if (p.shape==='circle') { ctx.beginPath(); ctx.arc(0,0,p.size/2,0,Math.PI*2); ctx.fill(); }
        else if (p.shape==='square') { ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size); }
        else if (p.shape==='triangle') {
          ctx.beginPath(); ctx.moveTo(0,-p.size/2); ctx.lineTo(p.size/2,p.size/2); ctx.lineTo(-p.size/2,p.size/2); ctx.closePath(); ctx.fill();
        } else if (p.shape==='star') { this._star(ctx,0,0,5,p.size/2,p.size/4); ctx.fill(); }
        p.vy+=.12; p.life-=.008; p.opacity=p.life;
      }
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.rotV;
      ctx.restore();
    });
    if (this.particles.length > 0) this.animFrame = requestAnimationFrame(() => this._animate());
    else { this.animFrame=null; ctx.clearRect(0,0,canvas.width,canvas.height); }
  },

  _burst(x,y,color) {
    const colors=['#ffd700','#ff6b6b','#4ecdc4','#f4a261',color];
    for (let i=0;i<20;i++) {
      const angle=(i/20)*Math.PI*2, speed=2+Math.random()*4;
      this.particles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,
        rot:0,rotV:5,size:5+Math.random()*6,color:colors[Math.floor(Math.random()*colors.length)],
        shape:'circle',opacity:1,life:1});
    }
  },

  _star(ctx,cx,cy,spikes,oR,iR) {
    let rot=(Math.PI/2)*3,step=Math.PI/spikes;
    ctx.beginPath(); ctx.moveTo(cx,cy-oR);
    for (let i=0;i<spikes;i++) {
      ctx.lineTo(cx+Math.cos(rot)*oR,cy+Math.sin(rot)*oR); rot+=step;
      ctx.lineTo(cx+Math.cos(rot)*iR,cy+Math.sin(rot)*iR); rot+=step;
    }
    ctx.lineTo(cx,cy-oR); ctx.closePath();
  },
};

function shuffle(arr) {
  const a = [...arr];
  for (let i=a.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

function buildWotd() {

  const w = ALL_WORDS[day % ALL_WORDS.length];
  const el = document.getElementById('wotdSection');
  el.innerHTML = `
    <div class="wotd-card">

        <div class="wotd-guj">${w.g}</div>

        <div class="wotd-english">${w.e}</div>

    </div>`;
  document.getElementById('wotdBtn').onclick = function() { AudioMgr.speak(w.tts, this); };
}

function buildChallenge() {
  const week = Math.floor(Date.now() / (7*86400000));
  const lesson = LESSONS[week % LESSONS.length];
  const completers = PROFILES.filter(p => (Store.profile(p.id).completed||[]).includes(lesson.id));
  const pct = Math.round((completers.length / PROFILES.length) * 100);
  document.getElementById('challengeSection').innerHTML = `
    <div class="challenge-card">
      <div class="challenge-label">🏆 This week\'s family challenge</div>
      <div class="challenge-title">${lesson.icon} Complete "${lesson.name}"</div>
      <div class="challenge-progress">
        <div class="challenge-bar-wrap"><div class="challenge-bar" style="width:${pct}%"></div></div>
        <div class="challenge-pct">${completers.length}/${PROFILES.length}</div>
      </div>
      <div class="challenge-profiles">
        ${PROFILES.map(p => {
          const done = completers.find(c => c.id===p.id);
          return `<div class="challenge-pip ${done?'done':''}">${profileEmoji(p,18)} ${p.name} ${done?'✓':''}</div>`;
        }).join('')}
      </div>
    </div>`;
  if (completers.length === PROFILES.length) {
    const key = 'chal_' + lesson.id;
    if (!localStorage.getItem(key)) {
      localStorage.setItem(key, '1');
      setTimeout(() => celebrate('🏆','Family challenge complete!','mega'), 500);
    }
  }
}

function buildLeaderboard(containerId, activeId) {
  const today = new Date();
  const last10 = Array.from({length:10},(_,i) => { const d=new Date(today); d.setDate(d.getDate()-i); return d.toISOString().slice(0,10); });
  const rows = PROFILES.map(p => {
    const d = Store.profile(p.id);
    const log = d.activityLog || [];
    return { p, d, days10: last10.filter(x=>log.includes(x)).length, allDays: log.length };
  });
  const s10   = [...rows].sort((a,b) => b.days10 - a.days10);
  const sAll  = [...rows].sort((a,b) => b.allDays - a.allDays);
  const ri = i => i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`;
  const card = (title, sorted, vFn) => `
    <div class="lb-card"><div class="lb-title">${title}</div>${
      sorted.map((r,i) => `<div class="lb-row">
        <div class="lb-rank">${ri(i)}</div>
        <div class="lb-emoji">${profileEmoji(r.p,24)}</div>
        <div class="lb-info">
          <div class="lb-pname">${r.p.name}</div>
          <div class="lb-val${r.p.id===activeId?' hi':''}">${vFn(r)}</div>
        </div>
      </div>`).join('')
    }</div>`;
  document.getElementById(containerId).innerHTML =
    card('🔥 Last 10 days', s10, r=>`${r.days10}/10`) +
    card('📅 All-time', sAll, r=>`${r.allDays} day${r.allDays!==1?'s':''}`);
}

function buildBholuLogin() {
  const allCompleted = new Set(PROFILES.flatMap(p => Store.profile(p.id).completed || []));
  const items = getBholuItems([...allCompleted]);
  const el = document.getElementById('bholuSection');
  if (!el) return;
  if (items.length === 0) {
    el.innerHTML = `<div class="bholu-section"><div style="font-size:48px">😊</div><div class="bholu-label">Complete Stage 1 to dress up Bholu!</div></div>`;
    return;
  }
  el.innerHTML = `<div class="bholu-section">
    <div class="bholu-label">Bholu\'s wardrobe</div>
    ${renderBholu([...allCompleted], 68)}
    <div style="font-size:12px;color:#888;margin-top:4px">${items.map(i=>i.emoji+' '+i.label).join(' · ')}</div>
  </div>`;
}

let _pinBuf = '', _pinMode = 'entry', _pinFirst = '', _pinProfileId = null;

function selectProfile(id) {
  _pinProfileId = id;
  const d = Store.profile(id);
  if (d.pin === null || d.pin === undefined) {
    _pinMode = 'setup1'; _pinBuf = ''; _pinFirst = '';
    _renderPin('Choose a 4-digit PIN', 'Step 1 of 2', false);
  } else {
    _pinMode = 'entry'; _pinBuf = '';
    _renderPin('Enter your PIN', '', false);
  }
  showScreen('pinScreen');
}

function _renderPin(label, step, shake) {
  const p = meta(_pinProfileId);
  document.getElementById('pinWrap').innerHTML = `
    <div class="pin-avatar-emoji">${profileEmoji(p, 64)}</div>
    <div class="pin-name">${p.name}</div>
    ${step ? `<div class="pin-step">${step}</div>` : ''}
    <div class="pin-label">${label}</div>
    <div class="pin-dots">${[0,1,2,3].map(()=>`<div class="pin-dot${shake?' wrong':''}"></div>`).join('')}</div>
    <div class="pin-error" id="pinError"></div>
    <div class="pin-keypad">${[1,2,3,4,5,6,7,8,9,'','0','⌫'].map(k =>
      `<button class="pin-key${k==='⌫'?' del':''}" onclick="pinKey('${k}')" ${k===''?'style="visibility:hidden"':''}>${k}</button>`
    ).join('')}</div>
    <button class="back-link" onclick="doLogout()">← Back to profiles</button>`;
}

function pinKey(k) {
  if (k === '⌫') _pinBuf = _pinBuf.slice(0, -1);
  else if (k !== '' && _pinBuf.length < 4) _pinBuf += k;
  document.querySelectorAll('.pin-dot').forEach((d,i) => {
    d.className = 'pin-dot' + (i < _pinBuf.length ? ' filled' : '');
  });
  if (_pinBuf.length === 4) setTimeout(_handlePin, 130);
}

function _handlePin() {
  const d = Store.profile(_pinProfileId);
  if (_pinMode === 'setup1') {
    _pinFirst = _pinBuf; _pinBuf = ''; _pinMode = 'setup2';
    _renderPin('Confirm your PIN', 'Step 2 of 2', false);
  } else if (_pinMode === 'setup2') {
    if (_pinBuf === _pinFirst) {
      Store.savePin(_pinProfileId, _pinBuf);
      enterHome(_pinProfileId);
    } else {
      _pinBuf = ''; _pinFirst = ''; _pinMode = 'setup1';
      _renderPin('Choose a 4-digit PIN', 'Step 1 of 2', true);
      setTimeout(() => { const e=document.getElementById('pinError'); if(e) e.textContent="PINs didn\'t match — try again"; }, 50);
    }
  } else {
    if (_pinBuf === d.pin) {
      // Enter home immediately (no blocking), sync in background
      enterHome(_pinProfileId);
      Store.syncFromServer(_pinProfileId).then(() => {
        // Refresh home stats silently if still on home screen
        if (document.getElementById('homeScreen').classList.contains('active')) {
          refreshHomeStats();
          buildLessonList();
        }
      });
    } else {
      _pinBuf = '';
      _renderPin('Enter your PIN', '', true);
      setTimeout(() => { const e=document.getElementById('pinError'); if(e) e.textContent='Wrong PIN — try again'; }, 50);
    }
  }
}

let _currentProfileId = null;

function enterHome(profileId) {
  _currentProfileId = profileId;
  const p = meta(profileId);
  const d = Store.profile(profileId);

  // Streak — recorded as an event so it's durable
  const todayS = todayISO();
  const prevStreak = d.streak;
  if (!(d.activityLog||[]).includes(todayS)) {
    Store.addEvent(profileId, 'streak_day', { date: todayS });
    // Re-read after event updates derived state
    const pin = d.pin;
    Object.assign(d, Store.profile(profileId));
    d.pin = pin;
  }

  // Streak milestones
  if (d.streak !== prevStreak) {
    if (d.streak === 3)  setTimeout(() => celebrate('🔥','3-day streak!','big'), 400);
    if (d.streak === 7)  setTimeout(() => celebrate('🚀','7-day streak! One week!','mega'), 400);
    if (d.streak === 14) setTimeout(() => celebrate('⭐','2-week streak!','mega'), 400);
    if (d.streak === 30) setTimeout(() => celebrate('👑','30-day streak! Amazing!','mega'), 400);
  }

  document.getElementById('homeAvatar').innerHTML = profileEmoji(p, 38);
  document.getElementById('homeName').textContent = 'Hi, ' + p.name + '!';
  document.getElementById('logoutBtn').onclick = doLogout;

  // Bholu on home screen
  const bholuWrap = document.getElementById('homeBholuWrap');
  if (bholuWrap) bholuWrap.innerHTML = renderBholu(d.completed||[], 56);

  refreshHomeStats();
  buildReviewSection();
  buildLessonList();

  // Warm up API and trigger AI generation in background
  fetch(CFG.API_BASE + '/v1/leaderboard', { headers:{'X-Api-Key':CFG.APP_KEY} }).catch(() => {});
  Store.maybeGenerateLesson(profileId);

  showScreen('homeScreen');
}

function refreshHomeStats() {
  if (!_currentProfileId) return;
  const d = Store.profile(_currentProfileId);
  const xp = d.xp || 0;
  const lv = getLevel(xp), nextLv = getNextLevel(xp);
  document.getElementById('statXP').textContent = xp;
  document.getElementById('statStreak').textContent = d.streak || 0;
  document.getElementById('statWords').textContent = (d.completed||[]).reduce((a,id) => {
    const l = LESSONS.find(x => x.id===id); return a + (l ? l.words.length : 0);

  if (lvEl) {

function buildReviewSection() {
  const due = SR.getDue(_currentProfileId);
  const el = document.getElementById('reviewSection');
  if (due.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <div class="review-card" id="reviewCard">
      <div class="review-icon">🧠</div>
      <div class="review-info">
        <div class="review-title">Daily Review — ${due.length} word${due.length!==1?'s':''} due</div>
        <div class="review-sub">Spaced repetition keeps words fresh in memory</div>
      </div>
      <div class="review-arrow">→</div>
    </div>`;
  document.getElementById('reviewCard').onclick = startReview;
}

function buildLessonList() {
  const d = Store.profile(_currentProfileId);
  const completed = d.completed || [];
  const list = document.getElementById('lessonList');
  list.innerHTML = '';

  STAGES.forEach(stage => {
    const stageLessons = LESSONS.filter(l => l.stage === stage.num);
    if (!stageLessons.length) return;

    // Unlock stage if previous stage is fully done (stage 1 always open)
    const prevDone = stage.num === 1 || LESSONS.filter(l=>l.stage===stage.num-1).every(l=>completed.includes(l.id));
    const stageComplete = stageLessons.every(l => completed.includes(l.id));
    const bholuItem = BHOLU_ITEMS.find(b => b.stage === stage.num);

    // Stage header
    const header = document.createElement('div');
    header.style.cssText = `font-size:11px;font-weight:700;color:${stage.color};text-transform:uppercase;letter-spacing:.06em;margin:.75rem 0 6px;display:flex;align-items:center;gap:6px`;
    header.innerHTML = `<span>Stage ${stage.num} — ${stage.name}</span>${stageComplete && bholuItem ? `<span style="font-size:14px">${bholuItem.emoji}</span>` : ''}`;
    list.appendChild(header);

    stageLessons.forEach((lesson, idx) => {
      const done = completed.includes(lesson.id);
      const locked = !prevDone || (idx > 0 && !completed.includes(stageLessons[idx-1].id));
      const needsReinf = done && SR.needsReinforcement(_currentProfileId, lesson.id);
      const mastery = SR.getMastery(_currentProfileId, lesson.id);
      const hasTpr = lesson.words.some(w => w.tpr);
      const isAI = lesson._ai;

      const row = document.createElement('div');
      row.className = 'lesson-row' + (locked ? ' locked' : '');
      row.innerHTML = `
        <div class="l-icon">${lesson.icon}</div>
        <div class="l-info">
          <div class="l-name">${lesson.name}
            ${hasTpr ? '<span style="font-size:10px;background:#FFF5F0;color:#993C1D;padding:2px 6px;border-radius:99px;font-weight:600;vertical-align:middle;margin-left:4px">🏃 TPR</span>' : ''}
            ${isAI ? '<span style="font-size:10px;background:#EEEDFE;color:#3C3489;padding:2px 6px;border-radius:99px;font-weight:600;vertical-align:middle;margin-left:4px">✨ AI</span>' : ''}
          </div>
          <div class="l-desc">${lesson.desc}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">
          <div class="l-badge ${done?'done':''}">${done?'✓ Done'+(mastery?` · ${Math.round(mastery.pct*100)}%`:''):locked?'🔒':'Start →'}</div>
          ${needsReinf ? '<div style="font-size:10px;background:#FAEEDA;color:#633806;padding:2px 7px;border-radius:99px;font-weight:600">⚡ Reinforce</div>' : ''}
        </div>`;

      if (!locked) {
        row.onclick = () => needsReinf ? startReinforcement(lesson) : startLesson(lesson);
      }
      list.appendChild(row);
    });
  });
}

function doLogout() {
  AudioMgr.stop();
  _currentProfileId = null;
  buildLogin();
  showScreen('loginScreen');
}

/* ═══════════════════════════════════════════════════════
   LESSON ENGINE
   Question types:
   • listen — hear + repeat into mic
   • pick   — multiple choice
═══════════════════════════════════════════════════════ */
let _lesson = null;
let _questions = [];
let _qIdx = 0;
let _sessXP = 0;
let _sessCorrect = 0;
let _mode = 'lesson'; // 'lesson' | 'review' | 'reinforce'

function _buildQuestions(words) {
  const qs = [];
  // Each word gets one listen card
  words.forEach(w => qs.push({ type:'listen', word:w }));
  // Each word gets one pick card (if enough words in pool for distractors)
  words.forEach(w => {
    const others = shuffle(ALL_WORDS.filter(x => x.g !== w.g)).slice(0, 3);
    if (others.length >= 3) qs.push({ type:'pick', word:w, choices:shuffle([w,...others]) });
  });
  return shuffle(qs).slice(0, Math.min(10, qs.length));
}

function startLesson(lesson) {
  _lesson = lesson; _mode = 'lesson';
  _questions = _buildQuestions(lesson.words);
  _qIdx = 0; _sessXP = 0; _sessCorrect = 0;
  showScreen('lessonScreen');
  _renderQ();
}

function startReinforcement(lesson) {
  _lesson = lesson; _mode = 'reinforce';
  const weak = SR.getWeakWords(_currentProfileId, lesson.id);
  const words = weak.length >= 3 ? weak : lesson.words;
  _questions = _buildQuestions(words);
  _qIdx = 0; _sessXP = 0; _sessCorrect = 0;
  showScreen('lessonScreen');
  _renderQ();
}

function startReview() {
  _lesson = null; _mode = 'review';
  const due = SR.getDue(_currentProfileId).slice(0, 10);
  if (!due.length) { enterHome(_currentProfileId); return; }
  _questions = _buildQuestions(due);
  _qIdx = 0; _sessXP = 0; _sessCorrect = 0;
  showScreen('lessonScreen');
  _renderQ();
}

function _renderQ() {
  const q = _questions[_qIdx];
  const pct = Math.round((_qIdx / _questions.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progLabel').textContent = _qIdx + ' / ' + _questions.length;
  document.getElementById('nextBtn').className = 'next-btn';
  document.getElementById('nextBtn').onclick = _nextQ;
  document.getElementById('backBtn').onclick = () => { AudioMgr.stop(); enterHome(_currentProfileId); };

  if (q.type === 'listen') _renderListen(q);
  else _renderPick(q);
}

function _renderListen(q) {
  const w = q.word;
  const modeLabel = _mode==='review' ? 'Review: ' : _mode==='reinforce' ? '⚡ Reinforce: ' : '';
  const typeLabel = w.tpr ? 'Listen, Act & Repeat' : 'Listen & Repeat';
  const card = document.getElementById('qCard');
  card.innerHTML = `
    <div class="q-type">${modeLabel}${typeLabel}</div>
    ${w.img ? `<div class="word-img">${w.img}</div>` : ''}
    <div class="guj-big">${w.g}</div>
    <div class="roman">${w.r}</div>
    <div class="english">${w.e}</div>
    ${w.tpr ? `<div class="tpr-box">🏃 ${w.tpr}</div>` : ''}
    <button class="listen-btn" id="listenBtn">🔊 Hear it</button>
    <div class="mic-section">
      <button class="mic-btn" id="micBtn">🎤 ${/Mobi|Android|iP(hone|od|ad)/i.test(navigator.userAgent)?'Tap to say it':'Now say it out loud'}</button>
      <div class="pronun-result" id="pronunResult"></div>
      <div class="mic-note" id="micNote">Say it before continuing</div>
    </div>`;

  // Use onclick assignment — NEVER addEventListener — prevents stacking
  document.getElementById('listenBtn').onclick = function() { AudioMgr.speak(w.tts, this); };
  document.getElementById('micBtn').onclick = () => _doRecord(w.roman, w);

  // Auto-play after short delay
  setTimeout(() => {
    const btn = document.getElementById('listenBtn');
    if (btn) AudioMgr.speak(w.tts, btn);
  }, 600);

  // Auto-show Continue after 2.8s — also records word as 'seen' in SR
  // so it enters the review cycle even if user skips mic
  setTimeout(() => {
    const nb = document.getElementById('nextBtn');
    if (nb && !nb.classList.contains('show')) {
      const sr = Store.profile(_currentProfileId).sr;
      if (!sr[w.g]) SR.record(_currentProfileId, w.g, false);
      nb.className = 'next-btn show';
    }
  }, 2800);
}

function _renderPick(q) {
  const w = q.word;
  const modeLabel = _mode==='review' ? 'Review: ' : _mode==='reinforce' ? '⚡ Reinforce: ' : '';
  const card = document.getElementById('qCard');
  card.innerHTML = `
    <div class="q-type">${modeLabel}What does this mean?</div>
    ${w.img ? `<div class="word-img">${w.img}</div>` : ''}
    <div class="guj-big">${w.g}</div>
    <div class="roman">${w.r}</div>
    <button class="listen-btn" id="listenBtn" style="margin-bottom:.75rem">🔊 Hear it</button>
    <div class="choices" id="choicesEl"></div>
    <div class="pick-feedback" id="pickFb"></div>`;

  document.getElementById('listenBtn').onclick = function() { AudioMgr.speak(w.tts, this); };

  const choicesEl = document.getElementById('choicesEl');
  q.choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c.e;
    btn.onclick = () => _checkChoice(btn, c.g, w.g, w.e, w);
    choicesEl.appendChild(btn);
  });

  setTimeout(() => {
    const btn = document.getElementById('listenBtn');
    if (btn) AudioMgr.speak(w.tts, btn);
  }, 600);
}

function _checkChoice(btn, selected, correct, correctLabel, word) {
  document.querySelectorAll('.choice-btn').forEach(b => { b.disabled = true; b.onclick = null; });
  const fb = document.getElementById('pickFb');
  const isCorrect = selected === correct;
  SR.record(_currentProfileId, word.g, isCorrect); // captured in lesson_complete event
  if (isCorrect) {
    btn.className = 'choice-btn correct';
    fb.className = 'pick-feedback good show';
    fb.textContent = '✓ Correct!';
    _addXP(true);
  } else {
    btn.className = 'choice-btn wrong';
    document.querySelectorAll('.choice-btn').forEach(b => {
      if (b !== btn && b.textContent.trim() === correctLabel) b.className = 'choice-btn correct';
    });
    fb.className = 'pick-feedback bad show';
    fb.textContent = 'Not quite — correct answer highlighted above.';
    document.getElementById('nextBtn').className = 'next-btn show';
  }
}

function _addXP(correct) {
  if (correct) { _sessXP += 10; _sessCorrect += 1; }
  document.getElementById('nextBtn').className = 'next-btn show';
  showToast('+10 XP ⭐');
  if (_sessCorrect > 0 && _sessCorrect % 5 === 0) Confetti.launch('small');
}

function _nextQ() {
  _qIdx++;
  if (_qIdx >= _questions.length) _finishLesson();
  else _renderQ();
}

function _doRecord(expectedRoman, word) {
  const micBtn = document.getElementById('micBtn');
  const result = document.getElementById('pronunResult');
  const note   = document.getElementById('micNote');
  const SR_fn  = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SR_fn) {
    result.className = 'pronun-result retry show';
    result.innerHTML = '🎤 Speech recognition unavailable. Use Safari on iPhone or Chrome on desktop.';
    if (note) note.style.display = 'none';
    document.getElementById('nextBtn').className = 'next-btn show';
    return;
  }

  let rec;
  try { rec = new SR_fn(); } catch(e) {
    result.className = 'pronun-result retry show';
    result.innerHTML = '🎤 Could not start mic. Tap Continue to keep going.';
    if (note) note.style.display = 'none';
    document.getElementById('nextBtn').className = 'next-btn show';
    return;
  }

  rec.lang = 'gu-IN';
  rec.continuous = false;
  rec.interimResults = false;
  rec.maxAlternatives = 1;

  micBtn.className = 'mic-btn recording';
  micBtn.textContent = '🔴 Listening... speak now!';
  micBtn.disabled = true;
  micBtn.onclick = null; // clear while recording
  result.className = 'pronun-result';
  if (note) note.style.display = 'none';

  let gotResult = false;

  rec.onresult = (e) => {
    gotResult = true;
    const heard = e.results[0][0].transcript.trim();
    const level = scorePronu(heard, expectedRoman);
    result.className = `pronun-result ${level} show`;
    result.innerHTML = `${randFB(level)}<div class="pronun-heard">We heard: "${heard}"</div>`;
    micBtn.disabled = false;
    const isCorrect = level === 'great' || level === 'ok';
    SR.record(_currentProfileId, word.g, isCorrect); // captured in lesson_complete event
    if (isCorrect) {
      micBtn.className = 'mic-btn success';
      micBtn.textContent = '✓ Good job!';
      micBtn.onclick = () => _doRecord(expectedRoman, word);
      _addXP(true);
    } else {
      micBtn.className = 'mic-btn fail';
      micBtn.textContent = '🎤 Try again';
      micBtn.onclick = () => _doRecord(expectedRoman, word);
      document.getElementById('nextBtn').className = 'next-btn show';
    }
  };

  rec.onerror = (e) => {
    gotResult = true;
    micBtn.disabled = false;
    if (['not-allowed','permission-denied','service-not-allowed'].includes(e.error)) {
      result.className = 'pronun-result nothing show';
      result.innerHTML = '🎤 Mic not allowed. On iPhone: Settings → Safari → Microphone → Allow.';
    } else {
      result.className = 'pronun-result nothing show';
      result.innerHTML = `🎤 ${e.error==='no-speech'?'Nothing heard — speak louder and try again.':'Mic error: '+e.error}`;
    }
    micBtn.className = 'mic-btn fail';
    micBtn.textContent = '🎤 Try again';
    micBtn.onclick = () => _doRecord(expectedRoman, word);
    document.getElementById('nextBtn').className = 'next-btn show';
  };

  rec.onend = () => {
    setTimeout(() => {
      if (!gotResult) {
        micBtn.disabled = false;
        micBtn.className = 'mic-btn fail';
        micBtn.textContent = '🎤 Try again';
        micBtn.onclick = () => _doRecord(expectedRoman, word);
        result.className = 'pronun-result nothing show';
        result.innerHTML = '🎤 Nothing heard — tap the mic and try again.';
        document.getElementById('nextBtn').className = 'next-btn show';
      }
    }, 300);
  };

  try {
    rec.start();
  } catch(e) {
    micBtn.disabled = false;
    micBtn.className = 'mic-btn';
    micBtn.textContent = '🎤 Try again';
    micBtn.onclick = () => _doRecord(expectedRoman, word);
    result.className = 'pronun-result retry show';
    result.innerHTML = '🎤 Could not start mic — check permissions.';
    document.getElementById('nextBtn').className = 'next-btn show';
    return;
  }

  // Desktop: auto-stop after 5s; iOS Safari stops automatically
  const isMobileSafari = /iP(hone|od|ad)/.test(navigator.userAgent) && /WebKit/.test(navigator.userAgent) && !/CriOS/.test(navigator.userAgent);
  if (!isMobileSafari) {
    setTimeout(() => { try { rec.stop(); } catch(err) {} }, 5000);
  }
}

/* ═══════════════════════════════════════════════════════
   FINISH LESSON
═══════════════════════════════════════════════════════ */
function _finishLesson() {
  const d = Store.profile(_currentProfileId);
  const p = meta(_currentProfileId);
  const prevLevel = getLevel(d.xp || 0);

  // Capture current SR snapshot for the event
  const srUpdates = {};
  Object.entries(Store.profile(_currentProfileId).sr || {}).forEach(([word, entry]) => {
    srUpdates[word] = { ...entry };
  });

  // Emit the durable event — this is the single write that cannot be lost
  const pct = _questions.length > 0 ? _sessCorrect / _questions.length : 0;
  if (_mode === 'review') {
    Store.addEvent(_currentProfileId, 'review_complete', {
      xp: _sessXP, correct: _sessCorrect, total: _questions.length, sr: srUpdates,
    });
  } else if (_lesson) {
    Store.addEvent(_currentProfileId, 'lesson_complete', {
      lessonId: _lesson.id, xp: _sessXP, correct: _sessCorrect,
      total: _questions.length, pct, sr: srUpdates,
    });
  }

  // Re-read state after event (guaranteed to be updated)
  const pin = d.pin;
  Object.assign(d, Store.profile(_currentProfileId));
  d.pin = pin;

  const newLevel = getLevel(d.xp);
  const leveledUp = newLevel.name !== prevLevel.name;

  // Stage completion check for Bholu
  if (_mode !== 'review' && _lesson) {
    const stageLessons = LESSONS.filter(l => l.stage === _lesson.stage);
    if (stageLessons.every(l => (d.completed||[]).includes(l.id))) {
      const item = BHOLU_ITEMS.find(b => b.stage === _lesson.stage);
      if (item) setTimeout(() => celebrate(item.emoji, `Stage ${_lesson.stage} complete! Bholu gets a ${item.label}!`, 'mega'), 1800);
    }
  }

  // Log streak day
  const today = todayISO();
  if (!(d.activityLog||[]).includes(today)) {
    Store.addEvent(_currentProfileId, 'streak_day', { date: today });
    Object.assign(d, Store.profile(_currentProfileId));
    d.pin = pin;
  }

  // Mark AI lesson complete on server
  if (_lesson && _lesson._ai && _lesson.firestoreId) {
    API.markLessonComplete(_currentProfileId, _lesson.firestoreId, { correct: _sessCorrect, total: _questions.length });
    Store.aiLessons = Store.aiLessons.map(l => l.id === _lesson.id ? {...l, completed:true} : l);
  }

  // Maybe generate next AI lesson
  Store.maybeGenerateLesson(_currentProfileId);

  // Log event to API
  API.logEvent(_currentProfileId, _lesson ? 'lesson_complete' : 'review_complete', {
    lessonId: _lesson ? _lesson.id : 'review',
    xpEarned: _sessXP, correct: _sessCorrect, total: _questions.length
  });

  // Build complete screen
  const perf = _sessCorrect / Math.max(1, _questions.length);
  const isMega = perf >= 0.9;
  document.getElementById('cIcon').textContent = isMega ? '🏆' : _sessCorrect >= 4 ? '🎉' : '👏';
  const modePrefix = _mode === 'reinforce' ? '⚡ Reinforcement: ' : _mode === 'review' ? '' : '';
  document.getElementById('cTitle').textContent = modePrefix + (_lesson ? _lesson.name + ' complete!' : 'Review complete!');
  document.getElementById('cSub').textContent = isMega
    ? `Incredible, ${p.name}! Near-perfect! 🌟`
    : perf >= 0.6 ? `Great work, ${p.name}! Keep it up!`
    : `Good effort, ${p.name}! Practice makes perfect.`;
  document.getElementById('cXP').textContent = _sessXP;
  document.getElementById('cCorrect').textContent = _sessCorrect;

  // SR next review hint
  const due = SR.getDue(_currentProfileId);
  document.getElementById('srNext').innerHTML = due.length > 0
    ? `🧠 <strong>${due.length} word${due.length!==1?'s':''}</strong> due for review — come back tomorrow!`
    : `✅ All caught up on reviews! Check back tomorrow.`;

  document.getElementById('doneBtn').onclick = () => enterHome(_currentProfileId);

  // Celebrations
  if (leveledUp) {
    setTimeout(() => celebrate(newLevel.icon, `Level up! You're a ${newLevel.name}!`, 'mega'), 300);
  } else {
    setTimeout(() => celebrate(isMega?'🏆':'🎉', isMega?'Perfect score!':'Lesson complete!', isMega?'mega':'big'), 300);
  }

  showScreen('completeScreen');
}

/* ═══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
// Load from localStorage and show UI immediately — zero waiting
Store.load();
Confetti.init();
buildLogin();

// Background: warm up API so Cloud Function is ready by the time user enters PIN
if (CFG.API_BASE) {
  fetch(CFG.API_BASE + '/v1/leaderboard', { headers:{'X-Api-Key':CFG.APP_KEY} })
    .then(r => r.json())
    .then(data => {
      // If API returned fresh leaderboard, silently update profiles
      if (data && data.leaderboard) {
        let changed = false;
        data.leaderboard.forEach(remote => {
          const local = Store.profile(remote.profileId);
          const safeXP = Math.max(local.xp||0, remote.xp||0);
          if (safeXP !== (local.xp||0)) { local.xp = safeXP; changed = true; }
        });
        if (changed) {
          Store._persist();
          if (document.getElementById('loginScreen').classList.contains('active')) buildLogin();
        }
      }
    })
    .catch(() => {});
}
